<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Filmes</title>

    <!-- Importando CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Importando Font Awasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--  Importando Scripts-->
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <!-- Sessão principal - INÍCIO DA PÁGINA -->
        <div id="section-main-container"">
            <section id="section-main">
            <span id="edition">
                - EST. 2026 - VOL. I -
            </span>
            <h1 id="section-main-title">Ciné<span>ma</span></h1>
            <p id="section-main-description">
                Um mural íntimo para os filmes e séries que moldam quem você é. Registre, revise, relembre.
            </p>

            <button id="btn-abrir-acervo">
                <span>Abrir acervo</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div id="section-main-end">
                <div>
                    <p>Role para descobrir</p>
                </div>
            </div>
            </section>
        </div>

        <!-- Sessão de acervos - LISTAGEM E GERENCIAMENTO DE FILMES -->
        <section id="section-acervo-container">
            <div id="section-acervo">
                <div id="section-acervo-header">
                    <h2 class="section-acervo-title">O <span>acervo</span></h2>

                    <p id="qnt-registrados"><strong>X</strong> Filmes registrados</p>
                </div>

                <!-- Barra de filtragem, com barra de pesquisa, filtros por status do filme (assistido, assistindo, quero ver e todos) e botão para adicionar um novo filme ao acervo -->
                <div id="filter-bar">
                    <div id="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" name="search" id="search" placeholder="Buscar por título...">
                    </div>

                    <div id="filters">
                        <button id="filter-todos" class="filter-selected" data-filtro="todos">Todos</button>
                        <button id="filter-assistidos" data-filtro="assistido">Assistidos</button>
                        <button id="filter-assistindo" data-filtro="assistindo">Assistindo</button>
                        <button id="filter-quero-ver" data-filtro="quero-ver">Quero ver</button>
                    </div>

                    <button id="add-movie">
                        <i class="fa-solid fa-plus"></i>
                        Adicionar Filme
                    </button>
                </div>

                <div id="movies-container">
                    <div id="movies-list"></div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>
            <span>Ciné</span>ma - PROJETO ACADÊMICO + HTML + CSS + JAVASCRIPT
        </p>
    </footer>

    <!-- Modal para adicionar filme -->
    <div id="modal-add-filme-overlay" class="modal-close">
        <div id="modal-add-filme">
            <div id="head-modal-add-filme">
                <h2 id="modal-titulo">Adicionar Filme</h2>
                <button id="modal-close-btn" type="button"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="form-add-filme">
                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input type="text" name="nome" id="nome" required>
                </div>
                <div class="input-group">
                    <label for="genero">Gênero</label>
                    <input type="text" name="genero" id="genero" required>
                </div>
                <div class="input-group">
                    <label for="status">Status</label>
                    <select name="status" id="status">
                        <option value="assistido">Assistido</option>
                        <option value="assistindo">Assistindo</option>
                        <option value="quero-ver">Quero ver</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="url-img">URL da imagem de capa</label>
                    <input type="text" name="url-img" id="url-img">
                    <img id="preview-img" alt="Preview da capa">
                </div>
                <div class="input-group">
                    <label>Avaliação</label>
                    <div class="avaliacao-inputs">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                    </div>
                </div>
                <button type="submit" id="btn-submit-filme">Salvar Filme</button>
            </form>
        </div>
    </div>
</body>

</html>
